name: Burlington Meeting Summarizer

on:
  schedule:
    # Every Tuesday at 10am UTC — Burlington council meets Mon/Tue,
    # minutes posted within 24 hours of the meeting.
    - cron: '0 10 * * 2'
  workflow_dispatch:  # manual trigger for testing

permissions:
  contents: write   # needed to commit summaries back to the repo

jobs:
  summarise:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests pdfplumber anthropic beautifulsoup4 playwright
          playwright install chromium --with-deps

      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/scrape_burlington.py

      - name: Commit new summaries (if any)
        env:
          TODAY: ${{ github.run_started_at }}
        run: |
          git config user.name  "CivicConnect Bot"
          git config user.email "bot@civicconnect"
          git add meetings/burlington/
          # Only commit if there are staged changes
          git diff --cached --quiet || git commit -m "Burlington meeting summaries ${TODAY}"
          git push
